server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets.
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/wasm
        text/javascript;
    gzip_min_length 1024;

    # Long-lived cache for immutable hashed assets (Flutter adds content hashes).
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Allow service worker to intercept these.
        add_header Access-Control-Allow-Origin "*";
    }

    # Service worker must never be cached so updates propagate immediately.
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # index.html — short cache so the app shell updates quickly.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: send all unknown paths to index.html so go_router
    # can handle deep links client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
