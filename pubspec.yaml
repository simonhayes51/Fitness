name: forgefit
description: "ForgeFit — All-in-One Gym & Nutrition Management App."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — Riverpod (clean, testable, compile-safe DI).
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation.
  go_router: ^14.1.0

  # Offline-first local persistence.
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Firebase (auth, firestore sync, storage, cloud functions, messaging).
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.3
  firebase_storage: ^11.7.5
  firebase_messaging: ^14.9.2
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Charts & visualisation.
  fl_chart: ^0.68.0

  # Barcode / food scanning.
  mobile_scanner: ^5.1.1

  # Local notifications (rest timers, reminders, streaks).
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.3

  # Utilities.
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0
  shared_preferences: ^2.2.3
  http: ^1.2.1
  share_plus: ^9.0.0
  csv: ^6.0.0
  image_picker: ^1.1.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.10
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/exercises.json
    - assets/data/foods.json
